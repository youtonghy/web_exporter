<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1 data-i18n="app.title"></h1>

      <label class="field">
        <span class="label" data-i18n="label.export_format"></span>
        <select id="exportFormat">
          <option value="pdf" selected data-i18n="option.pdf"></option>
          <option value="markdown" data-i18n="option.markdown"></option>
          <option value="png" data-i18n="option.png"></option>
          <option value="debug" data-i18n="option.debug_package"></option>
        </select>
      </label>

      <label class="field" id="pdfEngineRow" style="display: none;">
        <span class="label" data-i18n="label.pdf_engine"></span>
        <select id="pdfEngine">
          <option value="native" data-i18n="option.pdf_engine.native"></option>
          <option value="cdp" data-i18n="option.pdf_engine.cdp"></option>
          <option value="html2canvas" data-i18n="option.pdf_engine.html2canvas"></option>
        </select>
      </label>
      <p class="hint" id="pdfEngineHint" style="display: none;"></p>

      <label class="toggle" id="preserveStylesRow">
        <input id="preserveStyles" type="checkbox" checked />
        <span data-i18n="toggle.preserve_styles"></span>
      </label>

      <label class="toggle" id="enhancedImageLoadingRow">
        <input id="enhancedImageLoading" type="checkbox" />
        <span data-i18n="toggle.enhanced_images"></span>
      </label>

      <label class="toggle" id="imagePackagingRow">
        <input id="imagePackaging" type="checkbox" />
        <span data-i18n="toggle.image_packaging"></span>
      </label>

      <button id="selectAndExport" type="button" data-i18n="button.select_export"></button>

      <p class="hint" data-i18n="hint.select_element"></p>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </div>

    <script src="src/i18n/index.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
